<!DOCTYPE html>
<html>
    <head>
	    <meta charset="utf-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1">
	    <title>Calculator</title>
    <style>
            input[type=button]:hover{
            background :rgb(160, 118, 238); 
            color:white;
        }
    </style>
    </head>   
    <body>
	    <form method="POST" name="m1" class="m1">
		    <br>
		    <h2 align="center"> Simple JS Calculator </h2>
                        First Number:
				        <input type="text" name="t1"/><br>
				        <br>
				        Second Number: 
					    <input type="text" name="t2"/><br>
				        <br>
				        Result:      
				        <input type="text" name="t3"/><br><br>
				
					    <input type="button" name="t5" value="Addition" onclick="add()" />
					    <input type="button" name="t6" value="Substraction" onclick="sub()" />
					    <input type="button" name="t4" value="Multiplication" onclick="mul()" />
                        <input type="button" name="t7" value="Division" onclick="div()" />
						
	    </form>
    </body>
        <script type="text/javascript">
            function add(){
                var a = parseInt(document.m1.t1.value);
                var b = parseInt(document.m1.t2.value);
                var c = a + b;
                document.m1.t3.value = c;
            }
            function sub(){
                var a = parseInt(document.m1.t1.value);
                var b = parseInt(document.m1.t2.value);
                var c = a - b;
                document.m1.t3.value = c;
            }
            function mul(){
                var a = parseInt(document.m1.t1.value);
                var b = parseInt(document.m1.t2.value);
                var c = a * b;
                document.m1.t3.value = c;
            }
            function div(){
                var a = parseInt(document.m1.t1.value);
                var b = parseInt(document.m1.t2.value);
                if(b == 0){
                    alert("Division by zero is not allowed.");
                    return;
                }
                var c = a / b;
                document.m1.t3.value = c;
            }
        </script>
	</body>
</html>
